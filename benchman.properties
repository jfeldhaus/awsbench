

# AWS region
benchman.region=us-east-1

# SNS / SQS resource names
benchman.command.topic.name=benchman-commands
benchman.results.queue.name=benchman-results

# ECS configuration
benchman.cluster.name=benchman-cluster
benchman.task.definition=tptbm-task
benchman.subnet.id=subnet-0902eac10e9437045

# SQS polling behaviour
benchman.sqs.poll.wait.seconds=10
benchman.sqs.max.messages=10

# Controller timeouts (milliseconds)
benchman.worker.ready.timeout.ms=90000
benchman.result.wait.timeout.ms=30000
