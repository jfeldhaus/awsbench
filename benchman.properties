

# AWS region
benchman.region=us-east-1

# SNS / SQS resource names
benchman.command.topic.name=benchman-commands
benchman.results.queue.name=benchman-results

# ECS configuration
benchman.cluster.name=benchman-cluster
benchman.task.definition=benchman-task
benchman.subnet.id=subnet-0902eac10e9437045
benchman.ecr.repo.name=aws/awsbench

# SQS polling behaviour
benchman.sqs.poll.wait.sec=10
benchman.sqs.max.messages=10

# Controller timeouts (seconds)
benchman.worker.ready.timeout.sec=90
benchman.ready_request.retry.sec=2
benchman.result.wait.timeout.sec=300

# Worker timeout (seconds): how long a worker waits for READY_REQUEST before giving up
benchman.worker.start.timeout.sec=120

# Worker idle timeout (seconds): how long a worker waits between commands before giving up
benchman.worker.idle.timeout.sec=300
